<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SES Intelligence — 営業インテリジェンスツール</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- API KEY MODAL -->
  <div id="apiModal" class="modal-overlay hidden">
    <div class="modal-box api-modal-box">
      <div class="api-modal-icon">🔑</div>
      <h2 class="api-modal-title">APIキーを設定</h2>
      <p class="api-modal-desc">Anthropic Claude APIキーを入力してください。<br>キーはお使いのブラウザのlocalStorageに保存され、外部には送信されません。</p>
      <div class="input-group">
        <label>Anthropic API Key</label>
        <input type="password" id="claudeKeyInput" placeholder="sk-ant-..." />
      </div>
      <div class="input-group">
        <label>NewsAPI Key <span style="font-size:11px;opacity:0.6">（オプション: newsapi.org）</span></label>
        <input type="text" id="newsKeyInput" placeholder="NewsAPIキー（なければデモデータ使用）" />
      </div>
      <button class="btn-primary" id="saveApiBtn">保存して開始</button>
    </div>
  </div>

  <!-- ANALYSIS MODAL -->
  <div id="analysisModal" class="modal-overlay hidden">
    <div class="modal-box analysis-modal-box">
      <button class="modal-close" id="closeAnalysis">✕</button>
      <div id="analysisContent">
        <div class="analysis-loading">
          <div class="spinner"></div>
          <p>AI分析中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <span class="logo-badge">SES</span>
      <div class="header-title-group">
        <h1 class="header-title">Intelligence</h1>
        <span class="header-subtitle">営業インテリジェンスツール</span>
      </div>
    </div>
    <div class="header-center" id="todayTopics">
      <div class="today-label">📌 今日の営業ネタ</div>
      <div class="today-chips" id="topicChips">
        <span class="chip skeleton-chip"></span>
        <span class="chip skeleton-chip"></span>
        <span class="chip skeleton-chip"></span>
      </div>
    </div>
    <div class="header-right">
      <div class="header-date" id="headerDate"></div>
      <button class="btn-settings" id="settingsBtn">⚙ 設定</button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="main-layout">

    <!-- LEFT: AI PICKUP NEWS -->
    <section class="panel panel-left">
      <div class="panel-header">
        <div class="panel-title-row">
          <span class="panel-icon">🤖</span>
          <h2 class="panel-title">AI ピックアップ</h2>
          <span class="panel-badge">自動選定</span>
        </div>
        <button class="btn-refresh" id="refreshAiNews" title="更新">↻</button>
      </div>
      <div class="news-grid" id="aiNewsGrid">
        <!-- AI news cards injected here -->
        <div class="card skeleton-card"></div>
        <div class="card skeleton-card"></div>
        <div class="card skeleton-card"></div>
      </div>
    </section>

    <!-- RIGHT: USER SEARCH NEWS -->
    <section class="panel panel-right">
      <div class="panel-header">
        <div class="panel-title-row">
          <span class="panel-icon">🔍</span>
          <h2 class="panel-title">キーワード検索</h2>
        </div>
      </div>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="例: 生保 AI、金融DX、富士通 AI..." />
        <button class="btn-search" id="searchBtn">検索</button>
      </div>
      <div class="search-tags">
        <span class="tag-label">よく使う:</span>
        <button class="quick-tag" data-q="生保 AI">生保 AI</button>
        <button class="quick-tag" data-q="金融DX">金融DX</button>
        <button class="quick-tag" data-q="SIer 再編">SIer再編</button>
        <button class="quick-tag" data-q="製造業 DX">製造業DX</button>
        <button class="quick-tag" data-q="電力 システム">電力システム</button>
      </div>
      <div class="news-grid" id="searchNewsGrid">
        <div class="empty-state">
          <span class="empty-icon">🗞️</span>
          <p>キーワードを入力してニュースを検索してください</p>
        </div>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
